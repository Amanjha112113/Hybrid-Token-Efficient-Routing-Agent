# Maps each capability category to a *starting* tier index into the
# cost-ordered model list built at runtime from ALLOWED_MODELS.
#
# Tier index 0 = cheapest model, higher index = progressively larger/pricier.

categories:
  factual_knowledge:
    start_tier: 0
    max_escalations: 1
    max_tokens: 300

  mathematical_reasoning:
    start_tier: 1
    max_escalations: 2
    max_tokens: 2500

  sentiment_classification:
    start_tier: 0
    max_escalations: 1
    max_tokens: 250

  text_summarisation:
    start_tier: 0
    max_escalations: 1
    max_tokens: 300

  named_entity_recognition:
    start_tier: 0
    max_escalations: 1
    max_tokens: 250

  code_debugging:
    start_tier: 1
    max_escalations: 2
    max_tokens: 2500

  logical_reasoning:
    start_tier: 1
    max_escalations: 2
    max_tokens: 2500

  code_generation:
    start_tier: 1
    max_escalations: 2
    max_tokens: 2500

# Global defaults used if a category is somehow unmapped.
default:
  start_tier: 0
  max_escalations: 1

# Sampling parameters per call.
generation:
  max_tokens: 800
  temperature: 0.1
